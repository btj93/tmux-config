set -g mouse on
set -g prefix C-a

bind T set-window-option synchronize-panes
# Status bar

set -g @plugin 'btj93/minimal-tmux-status'
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-left-arrow ""
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-fg "#111210"
set -g @minimal-tmux-bg "#F1E9D2"
set -g @minimal-tmux-right false
set -g @minimal-tmux-indicator-str "STANDBY "
set -g @minimal-tmux-indicator-active-str "ENGAGED "
set -g @minimal-tmux-indicator-fg "#F1E9D2"
set -g @minimal-tmux-indicator-bg "#252623"
set -g @minimal-tmux-indicator-active-fg "#252623"
set -g @minimal-tmux-indicator-active-bg "#F1E9D2"
set -g @minimal-tmux-status "top"
set -g status-bg "#3a3d37"
set -g status-fg "#f1e9d2"

set -g pane-border-format "#P: #{pane_current_command}"

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_prev ""

#  ベーシックペイン
set -g window-style 'fg=white, bg=colour240'

#  アクティブペイン
set -g window-active-style 'fg=white, bg=colour236'

bind c new-window -c '~/.config'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Border lines between panes are thicker
# single -> single lines using ACS or UTF-8 characters
# double -> double lines using UTF-8 characters
# heavy  -> heavy lines using UTF-8 characters
# simple -> simple ASCII characters
# number -> the pane number
set -g pane-border-lines heavy

# Indicate active pane by colouring only half of the border in windows with 
# exactly two panes, by displaying arrow markers, by drawing both or neither.
# [off | colour | arrows | both]
set -g pane-border-indicators off

bind-key -n C-Up resize-pane -U
bind-key -n C-Down resize-pane -D
bind-key -n C-Left resize-pane -L
bind-key -n C-Right resize-pane -R

# Tab title
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format ' #{b:pane_current_path} > #{pane_current_command}'
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# fzf switch window
bind w display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} - #{window_name}' \
                          | grep -v \"^$(tmux display-message -p '#S')\$\" \
                          | fzf --reverse \
                          | sed -E 's/ - .*//' \
                          | xargs -r tmux switch-client -t"

# Enable mouse support to resize panes, scrolling, etc
set -g mouse on

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-logging"
set -g @plugin "tmux-plugins/tmux-sidebar"
set -g @plugin "tmux-plugins/tmux-urlview"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-sessionist"
set -g @plugin "tmux-plugins/tmux-pain-control"
set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin "christoomey/vim-tmux-navigator"
set -g @vim_navigator_mapping_left "C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

# automatically saves sessions for you every 15 minutes (this must be the last plugin)
# https://github.com/tmux-plugins/tmux-continuum
set -g @plugin "tmux-plugins/tmux-continuum"

# enable tmux-continuum functionality
set -g @continuum-restore 'on'
# Set the save interval in minutes, default is 15
set -g @continuum-save-interval '5'

set -g @pane_resize 5

# for image.nvim
set -gq allow-passthrough on
set -g visual-activity off

# Initialize TMUX plugin manager - keep at bottom
run "~/.tmux/plugins/tpm/tpm"

set -gu aggressive-resize
